  <script>
  (function(){
    const banner = document.querySelector('.site-banner');
    const slides = Array.from(document.querySelectorAll('.catalog-cover__slide'));
    const dotsWrap = document.querySelector('[data-cover-dots]');
    if (!banner || !slides.length || !dotsWrap) return;
    const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let current = 0;
    let timer = null;
    const dots = slides.map((_, index) => {
      const dot = document.createElement('button');
      dot.type = 'button';
      dot.className = 'catalog-cover__dot';
      dot.setAttribute('aria-label', `Ver capa ${index + 1}`);
      dot.addEventListener('click', (event) => {
        event.preventDefault();
        show(index);
        start();
      });
      dotsWrap.appendChild(dot);
      return dot;
    });
    function show(index){
      current = (index + slides.length) % slides.length;
      slides.forEach((slide, i) => {
        const offset = (i - current + slides.length) % slides.length;
        slide.classList.toggle('is-active', offset === 0);
        slide.classList.toggle('is-next', offset === 1);
        slide.classList.toggle('is-far-next', offset === 2);
        slide.classList.toggle('is-far-prev', offset === slides.length - 2);
        slide.classList.toggle('is-prev', offset === slides.length - 1);
      });
      dots.forEach((dot, i) => dot.classList.toggle('is-active', i === current));
    }
    function start(){
      if (timer) clearInterval(timer);
      if (!reducedMotion && slides.length > 1) timer = setInterval(() => show(current + 1), 3000);
    }
    show(0);
    start();
  })();
  </script>
