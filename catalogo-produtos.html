<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lemoov | Catálogo rápido</title>
  <meta name="description" content="Catálogo rápido Lemoov para comprar direto do Instagram." />
  <meta property="og:title" content="Lemoov | Catálogo rápido" />
  <meta property="og:description" content="Catálogo rápido Lemoov para comprar direto do Instagram." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Lemoov Fitness" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:image" content="image/Conjunto_Calca/iris_branco_0384.jpg" />
  <link rel="stylesheet" href="styles.css?v=6" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    window.LEMOOV_GA_ID = window.LEMOOV_GA_ID || 'G-XXXXXXXXXXXX';
    window.LEMOOV_PIXEL_ID = window.LEMOOV_PIXEL_ID || '000000000000000';
    const isLocal =
      location.protocol === 'file:' ||
      location.hostname === 'localhost' ||
      location.hostname === '127.0.0.1';
    window.LEMOOV_API_BASE = '';
    window.LEMOOV_IMAGE_BASE = '';
  </script>
  <style>
    .site-banner {
      width: 100%;
      overflow: hidden;
      line-height: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 45%, rgba(255, 214, 48, 0.18), transparent 32%),
        linear-gradient(120deg, #061d19 0%, #0c3f2f 46%, #082b5f 100%);
      border-bottom: 1px solid rgba(255, 211, 74, 0.28);
    }
    .site-banner img {
      width: min(100%, 1080px);
      height: auto;
      max-height: 72vh;
      object-fit: contain;
      object-position: center;
      display: block;
      box-shadow: 0 24px 80px rgba(2, 23, 35, 0.28);
    }
    .catalog-landing .header {
      position: sticky;
      top: 0;
      background:
        linear-gradient(110deg, rgba(4, 33, 29, 0.98) 0%, rgba(8, 66, 45, 0.97) 50%, rgba(7, 39, 86, 0.97) 100%);
      border-bottom: 2px solid rgba(247, 211, 74, 0.42);
      box-shadow: 0 10px 28px rgba(4, 31, 43, 0.18);
      padding: 0;
    }
    .catalog-landing .header__wrap {
      min-height: 58px;
      justify-content: flex-end;
      padding: 0 24px;
      position: relative;
    }
    .catalog-landing .logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      flex-grow: 0;
      text-align: center;
    }
    .catalog-landing .logo a {
      color: #f6d74d;
      font-size: 1.08rem;
      letter-spacing: 0.22em;
      flex-direction: row;
      gap: 0.5rem;
      text-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }
    .catalog-landing .logo a span {
      color: rgba(245, 251, 255, 0.88);
      font-size: 0.74em;
      letter-spacing: 0.32em;
      margin: 0;
    }
    .catalog-landing .nav {
      margin-left: auto;
    }
    .catalog-landing .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      padding: 0;
      display: grid;
      place-items: center;
      color: #f6d74d;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 211, 74, 0.2);
      font-size: 1rem;
    }
    .catalog-landing .badge {
      background: #f6d74d;
      color: #06321f;
      width: 18px;
      height: 18px;
      font-size: 0.62rem;
    }
    body.catalog-landing {
      background: linear-gradient(180deg, #f8fbf2 0%, #eef8f2 38%, #f7fbff 100%);
    }
    .catalog-landing .layout {
      padding-top: 26px;
    }
    .catalog-landing .filters-cards {
      display: none;
    }
    .catalog-landing .grid.carousel-active,
    .catalog-landing .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
      overflow: visible;
      padding-bottom: 34px;
      scroll-snap-type: none;
    }
    .catalog-landing .grid.carousel-active > .product-card {
      min-width: 0;
      flex: initial;
      scroll-snap-align: unset;
    }
    .catalog-landing .grid-controls {
      display: none;
    }
    .catalog-landing .product-card {
      border-radius: 16px;
      min-height: auto;
      border: 1px solid rgba(5, 92, 57, 0.12);
      background:
        linear-gradient(#ffffff, #ffffff) padding-box,
        linear-gradient(135deg, rgba(11,122,79,0.26), rgba(246,215,77,0.2), rgba(11,79,149,0.18)) border-box;
      box-shadow: 0 10px 24px rgba(17, 58, 52, 0.08);
    }
    .catalog-landing .product-card:hover {
      transform: translateY(-3px);
    }
    .catalog-landing .product-card__media {
      min-height: 0;
      aspect-ratio: 4 / 5;
      border-radius: 16px 16px 0 0;
    }
    .catalog-landing .product-card__media::after {
      content: "";
      display: none;
    }
    .catalog-landing .product-card__info {
      padding: 10px 12px 11px;
      gap: 4px;
    }
    .catalog-landing .product-card__name {
      font-size: 0.88rem;
      margin-bottom: 0;
    }
    .catalog-landing .product-card__desc {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.7rem;
      line-height: 1.25;
    }
    .catalog-landing .product-card__price {
      font-size: 0.96rem;
      line-height: 1.2;
      color: #0b7a4f;
    }
    .catalog-landing .product-card__price .original-price {
      font-size: 0.78rem;
    }
    .catalog-landing .product-card__note {
      margin-top: 2px;
      font-size: 0.68rem;
      line-height: 1.25;
      color: #66756f;
    }
    .catalog-landing .product-card__options {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-top: 6px;
      padding-top: 7px;
      border-top: 1px solid rgba(5, 92, 57, 0.1);
    }
    .catalog-landing .product-card__colors,
    .catalog-landing .product-card__sizes {
      min-width: 0;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      align-items: center;
      column-gap: 7px;
    }
    .catalog-landing .product-card__legend {
      font-size: 0.66rem;
      margin: 0;
      color: #0b382e;
      line-height: 1;
    }
    .catalog-landing .product-card__info .swatches,
    .catalog-landing .product-card__info .sizes__wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
      scrollbar-width: none;
      padding: 2px 1px;
    }
    .catalog-landing .product-card__info .swatches::-webkit-scrollbar,
    .catalog-landing .product-card__info .sizes__wrap::-webkit-scrollbar {
      display: none;
    }
    .catalog-landing .product-card__info .swatch,
    .catalog-landing .product-card__info .size {
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      min-width: 24px;
      font-size: 0.62rem;
      border-radius: 999px;
    }
    .catalog-landing .product-card__info .size {
      width: auto;
      min-width: 32px;
      padding: 0 9px;
      background: #f4f7f2;
      border-color: rgba(11,79,149,0.14);
    }
    .catalog-landing .product-card__info .swatch[data-selected="true"],
    .catalog-landing .product-card__info .size[data-selected="true"] {
      border-color: #0b7a4f;
      box-shadow: 0 0 0 2px rgba(246,215,77,0.42);
      background: #ffffff;
    }
    .catalog-landing .product-card__info .swatch__dot {
      width: 12px;
      height: 12px;
    }
    .catalog-landing .product-card__btn-add {
      border-radius: 0 0 16px 16px;
      padding: 0.58rem 0.5rem;
      font-size: 0.66rem;
      letter-spacing: 0.09em;
      background: linear-gradient(120deg, #0b7a4f 0%, #0b7a4f 45%, #0b4f95 100%);
      color: #ffffff;
    }
    .catalog-landing .product-card__badge {
      top: 7px;
      left: 7px;
    }
    .catalog-landing .product-card__badge--launch {
      left: auto;
      right: 7px;
    }
    .catalog-landing .badge-off,
    .catalog-landing .badge-launch {
      font-size: 0.58rem;
      padding: 5px 6px;
      border-radius: 7px;
      background: linear-gradient(120deg, #f6d74d, #23b26d);
      color: #05241f;
    }
    @media (max-width: 520px) {
      .site-banner img {
        width: 100%;
        max-height: none;
        box-shadow: none;
      }
      .catalog-landing .header__wrap {
        min-height: 54px;
        padding: 0 14px;
      }
      .catalog-landing .logo a {
        font-size: 0.92rem;
        letter-spacing: 0.14em;
        flex-direction: column;
        gap: 0;
      }
      .catalog-landing .logo a span {
        font-size: 0.68em;
        letter-spacing: 0.26em;
      }
      .catalog-landing .btn-icon {
        width: 38px;
        height: 38px;
      }
      .catalog-landing .layout {
        padding-top: 14px;
      }
      .catalog-landing .grid.carousel-active,
      .catalog-landing .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }
      .catalog-landing .product-card__info {
        padding: 9px 9px 10px;
      }
      .catalog-landing .product-card__name {
        font-size: 0.78rem;
      }
      .catalog-landing .product-card__colors,
      .catalog-landing .product-card__sizes {
        grid-template-columns: 34px minmax(0, 1fr);
        column-gap: 5px;
      }
      .catalog-landing .product-card__legend {
        font-size: 0.6rem;
      }
      .catalog-landing .product-card__info .swatch,
      .catalog-landing .product-card__info .size {
        width: 22px;
        height: 22px;
        min-width: 22px;
        font-size: 0.58rem;
      }
      .catalog-landing .product-card__info .size {
        width: auto;
        min-width: 28px;
        padding: 0 7px;
      }
    }
    @media (min-width: 1180px) {
      .catalog-landing .container {
        width: min(100% - 40px, 1320px);
      }
      .catalog-landing .grid.carousel-active,
      .catalog-landing .grid {
        grid-template-columns: repeat(auto-fill, minmax(205px, 1fr));
      }
    }
  </style>
</head>
<body class="catalog-landing">

  <a href="#grid" class="site-banner" aria-label="Ver coleção">
    <img src="image/banner.jpeg" alt="Coleção Arena Lemoov Fitness" loading="eager" fetchpriority="high" />
  </a>

  <header class="header">
    <div class="container header__wrap">
      <h1 class="logo">
        <a href="index.html">Lemoov <span>Fitness</span></a>
      </h1>

      <nav class="nav">
        <button id="openCart" class="btn-icon" aria-label="Abrir carrinho">
          <i id="cartIcon" class="fas fa-shopping-cart"></i>
          <span id="cartCount" class="badge">0</span>
        </button>
      </nav>
    </div>
  </header>

  <div class="container layout layout--single">
    <main class="content" style="position:relative;">
      <section id="grid" class="grid"></section>
    </main>
  </div>

  <!-- Modal Produto -->
  <dialog id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalNome" aria-describedby="modalDesc">
    <div class="modal__header">
      <button class="modal__close" id="closeModal" aria-label="Fechar">✕</button>
    </div>
    <article class="modal__content">
      <section class="modal__info">
        <h2 id="modalNome"></h2>
        <div id="modalDesc" class="modal__desc muted"></div>
        <section class="modal__options">
          <fieldset class="modal__colors">
            <legend>Cor:</legend>
            <ul id="modalColors" class="swatches"></ul>
          </fieldset>
          <fieldset class="modal__sizes">
            <legend>Tamanho:</legend>
            <ul id="modalSizes" class="sizes__wrap"></ul>
          </fieldset>
        </section>
        <p id="modalPreco" class="price"></p>
      </section>
      <div class="modal__mediaWrap">
        <figure class="modal__media">
          <img id="modalImg" src="" alt="Produto" />
        </figure>
        <div class="modal__cta">
          <button id="btnAdd" class="btn btn--primary">Adicionar ao carrinho</button>
        </div>
      </div>
    </article>
  </dialog>

  <!-- Modal de escolha (Conjunto/Top/Legging) -->
  <dialog id="vendaModal" class="modal venda-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="vendaTitle">
    <article class="venda-modal__content">
      <div class="venda-modal__header">
        <div class="venda-modal__header-text">
          <h2 id="vendaTitle"></h2>
          <p id="vendaMeta" class="venda-modal__meta"></p>
        </div>
        <button class="venda-modal__close" id="closeVendaModal" aria-label="Fechar">✕</button>
      </div>
      <div class="venda-modal__body">
        <p class="venda-modal__note">Adicione o conjunto ou a peça individual.</p>
        <div id="vendaOptions" class="venda-options"></div>
        <div class="venda-total">
          <span>Total</span>
          <strong id="vendaTotal">R$ 0,00</strong>
        </div>
        <div class="venda-actions">
          <button id="vendaAddBtn" class="btn btn--primary">Adicionar ao carrinho</button>
        </div>
      </div>
    </article>
  </dialog>

  <!-- Drawer Carrinho (modal central) -->
  <aside id="cart" class="cart" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="cartTitle" tabindex="-1">
    <div class="cart__header">
      <h3 id="cartTitle">Seu Carrinho</h3>
      <button class="cart__close" id="closeCart" aria-label="Fechar">✕</button>
    </div>
    <ul id="cartList" class="cart__list"></ul>
    <div class="cart__footer">
      <div class="cart__total">
        <span>Total:</span>
        <strong id="cartTotal">R$ 0,00</strong>
      </div>
      <a id="btnWhats" class="btn btn--whats" target="_blank" rel="noopener">Finalizar no WhatsApp</a>
    </div>
  </aside>
  <div id="cartBackdrop" class="backdrop"></div>

  <script src="script.js?v=7"></script>
</body>
</html>
