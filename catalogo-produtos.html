<body class="catalog-landing">

  <div class="site-banner" style="position:relative;">
    <a href="#grid" aria-label="Ver coleção" style="display:contents;">
      <img src="image/banner.jpeg" alt="Coleção Arena Lemoov Fitness" width="1536" height="1024" loading="eager" fetchpriority="high" />
    </a>
    <canvas id="confettiCanvas" aria-hidden="true" style="
      position:absolute;inset:0;width:100%;height:100%;
      pointer-events:none;z-index:10;"></canvas>
  </div>

  <script>
  (function(){
    const canvas = document.getElementById('confettiCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const COLORS = ['#383838','#383838','#A8C63A','#A8C63A','#EBD8C7','#EBD8C7','#ffffff'];
    const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isMobile = window.matchMedia && window.matchMedia('(max-width: 620px)').matches;
    const TOTAL  = reducedMotion ? 0 : (isMobile ? 90 : 220);
    let pieces   = [];
    let raf      = null;
    let running  = false;

    function resize(){
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }

    function randomBetween(a,b){ return a + Math.random()*(b-a); }

    function spawn(){
      pieces = [];
      for(let i=0;i<TOTAL;i++){
        const burst = Math.random();
        const side = Math.random() < 0.5 ? -1 : 1;
        const fromSide = burst < 0.34;
        const size = randomBetween(5,15);
        pieces.push({
          x:      fromSide ? (side < 0 ? randomBetween(-40, 80) : randomBetween(canvas.width - 80, canvas.width + 40)) : randomBetween(0, canvas.width),
          y:      fromSide ? randomBetween(canvas.height * 0.12, canvas.height * 0.78) : randomBetween(-canvas.height*0.85, -10),
          w:      size,
          h:      size * randomBetween(0.35,1.15),
          r:      randomBetween(0, Math.PI*2),
          dr:     randomBetween(-0.18,0.18),
          vx:     fromSide ? randomBetween(2.8,7.4) * -side : randomBetween(-1.8,1.8),
          vy:     fromSide ? randomBetween(-5.8,-1.2) : randomBetween(2.8,6.8),
          color:  COLORS[Math.floor(Math.random()*COLORS.length)],
          alpha:  1,
          fade:   randomBetween(0.0022,0.0065),
          gravity: randomBetween(0.045,0.095),
          swing:  randomBetween(0.018,0.06),
          wave:   randomBetween(0, Math.PI*2),
          shape:  Math.random()<0.62?'rect':(Math.random()<0.5?'circle':'stripe'),
        });
      }
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let alive = false;
      for(const p of pieces){
        p.wave += p.swing;
        p.x  += p.vx + Math.sin(p.wave) * 0.45;
        p.y  += p.vy;
        p.vy += p.gravity; // gravidade suave
        p.r  += p.dr;
        p.alpha -= p.fade;
        if(p.alpha<=0) continue;
        alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0,p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.r);
        ctx.fillStyle = p.color;
        if(p.shape==='circle'){
          ctx.beginPath();
          ctx.arc(0,0,p.w/2,0,Math.PI*2);
          ctx.fill();
        } else if (p.shape === 'stripe') {
          ctx.fillRect(-p.w/2,-p.h/2,p.w*1.7,Math.max(2,p.h*0.35));
        } else {
          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        }
        ctx.restore();
      }
      if(alive){ raf=requestAnimationFrame(draw); }
      else { running=false; ctx.clearRect(0,0,canvas.width,canvas.height); }
    }

    function launch(){
      if (!TOTAL || reducedMotion) return;
      if(running && pieces.length) {
        const extra = pieces.slice(0, Math.floor(TOTAL * 0.12)).map(p => ({ ...p, y: randomBetween(-canvas.height * 0.35, -10), alpha: 1 }));
        pieces.push(...extra);
        return;
      }
      running=true;
      resize();
      spawn();
      raf=requestAnimationFrame(draw);
    }

    // dispara ao carregar e ao hover/touch no banner, com intensidade reduzida
    window.addEventListener('load', ()=>{ setTimeout(launch, 450); });
    canvas.parentElement.addEventListener('mouseenter', launch);
    canvas.parentElement.addEventListener('touchstart', launch, {passive:true});

    // redimensiona sem parar animação
    window.addEventListener('resize', resize, {passive:true});
  })();
  </script>

          <span class="catalog-search__icon" aria-hidden="true"><i class="fas fa-magnifying-glass"></i></span>
          <input id="catalogSearch" type="search" autocomplete="off" placeholder="Buscar peça, cor ou tamanho" aria-label="Buscar peça, cor ou tamanho" />
          <button class="catalog-search__clear" id="catalogSearchClear" type="button" aria-label="Limpar busca">
            <i class="fas fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
        <span class="catalog-search__meta" id="catalogSearchMeta"></span>
      </section>
      <div class="floating-toggle-group">
        <button class="floating-toggle floating-toggle--whats" id="toggleWhats" type="button">
          <i class="fab fa-whatsapp" aria-hidden="true"></i>
          <span>WhatsApp</span>
        </button>
      </div>
      <section id="grid" class="grid"></section>
    </main>
  </div>

  <!-- Modal Produto -->
  <dialog id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalNome" aria-describedby="modalDesc">
    <div class="modal__header">
      <button class="modal__close" id="closeModal" aria-label="Fechar">✕</button>
    </div>
    <article class="modal__content">
      <section class="modal__info">
        <h2 id="modalNome"></h2>
        <div id="modalDesc" class="modal__desc muted"></div>
        <section class="modal__options">
          <fieldset class="modal__colors">
            <legend>Cor:</legend>
            <ul id="modalColors" class="swatches"></ul>
          </fieldset>
          <fieldset class="modal__sizes">
            <legend>Tamanho:</legend>
            <ul id="modalSizes" class="sizes__wrap"></ul>
          </fieldset>
        </section>
        <p id="modalPreco" class="price"></p>
      </section>
      <div class="modal__mediaWrap">
        <figure class="modal__media">
          <img id="modalImg" src="" alt="Produto" />
        </figure>
        <div class="modal__cta">
          <button id="btnAdd" class="btn btn--primary">Adicionar ao carrinho</button>
        </div>
      </div>
    </article>
  </dialog>

  <!-- Drawer Carrinho (modal central) -->
  <aside id="cart" class="cart" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="cartTitle" tabindex="-1">
    <div class="cart__header">
      <h3 id="cartTitle">Seu Carrinho</h3>
      <button class="cart__close" id="closeCart" aria-label="Fechar">✕</button>
    </div>
    <ul id="cartList" class="cart__list"></ul>
    <div class="cart__footer">
      <div class="cart__total">
        <span>Total:</span>
        <strong id="cartTotal">R$ 0,00</strong>
      </div>
      <a id="btnWhats" class="btn btn--whats" target="_blank" rel="noopener">Finalizar no WhatsApp</a>
    </div>
  </aside>
  <div id="cartBackdrop" class="backdrop"></div>

  <div class="cookie-banner" id="cookieBanner" role="region" aria-label="Aviso de cookies" style="display:none;">
    <p>Usamos cookies para melhorar sua experiência, calcular frete e, com sua permissão, personalizar ofertas. Veja nossa <a href="privacidade.html" target="_blank" rel="noopener">Política de Privacidade</a>.</p>
    <div class="cookie-banner__actions">
      <button class="cookie-banner__btn-reject" id="btnRejectCookies">Recusar</button>
      <button class="cookie-banner__btn-accept" id="btnAcceptCookies">Aceitar cookies</button>
    </div>
  </div>

  <script src="script.js?v=23"></script>
</body>
</html>
