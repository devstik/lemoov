<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relatório de Vendas | Lemoov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px;padding:24px}
    h1{font-size:20px;font-weight:700;margin-bottom:4px}
    .sub{color:#64748b;font-size:13px;margin-bottom:24px}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
    .kpi{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:14px 18px}
    .kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#64748b;margin-bottom:4px}
    .kpi-val{font-size:22px;font-weight:700}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:24px}
    .card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
    .card-head{padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
    .card-body{padding:14px 16px}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid #f1f5f9;background:#fafbfc;white-space:nowrap}
    td{padding:9px 10px;border-bottom:1px solid #f8fafc;font-size:13px}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
    .pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
    .s-reservado{background:#fef3c7;color:#92400e}.s-confirmado{background:#dbeafe;color:#1e40af}
    .s-enviado{background:#ede9fe;color:#5b21b6}.s-entregue{background:#dcfce7;color:#166534}.s-cancelado{background:#f1f5f9;color:#64748b}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px}
    .bar-bg{flex:1;background:#f1f5f9;border-radius:4px;height:16px;overflow:hidden}
    .bar-fill{background:#2563eb;height:100%;border-radius:4px}
    @media print{body{background:#fff;padding:0}button{display:none}}
    .no-print{margin-bottom:16px}
  </style>
</head>
<body>
  <div class="no-print" style="display:flex;align-items:center;gap:12px">
    <a href="/api/produtos-admin" style="font-size:13px;color:#2563eb;text-decoration:none">← Admin</a>
    <button onclick="window.print()" style="padding:6px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:13px">Imprimir</button>
  </div>
  <h1>Relatório de Vendas</h1>
  <div class="sub" id="relPeriodo">Carregando…</div>

  <div class="kpi-grid" id="kpis"></div>

  <div class="grid">
    <div class="card">
      <div class="card-head">Pedidos por status</div>
      <div class="card-body" id="byStatus"></div>
    </div>
    <div class="card">
      <div class="card-head">Produtos mais vendidos</div>
      <div class="card-body" id="byProd"></div>
    </div>
    <div class="card">
      <div class="card-head">Por UF</div>
      <div class="card-body" id="byUf"></div>
    </div>
    <div class="card">
      <div class="card-head">Por cidade</div>
      <div class="card-body" id="byCity"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">Todos os pedidos</div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Pedido</th><th>Cliente</th><th>Status</th><th>Itens</th><th>Pagamento</th><th>Subtotal</th><th>Taxa</th><th>Total</th><th>Data</th></tr></thead>
        <tbody id="tblPedidos"></tbody>
      </table>
    </div>
  </div>

<script>
  function fmtR(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
  function fmtD(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function sPill(s){const labels={reservado:'Reservado',confirmado:'Confirmado',enviado:'Enviado',entregue:'Entregue',cancelado:'Cancelado'};return`<span class="pill s-${s||'reservado'}">${labels[s]||s||'Reservado'}</span>`}
  function toRows(obj,fmtVal){
    const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    const max=entries[0]?.[1]||1;
    return entries.map(([k,v])=>`
      <div class="bar-row">
        <span style="width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(k)}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div>
        <span style="width:80px;text-align:right;font-weight:600">${fmtVal?fmtVal(v):v}</span>
      </div>`).join('')||'<div style="color:#94a3b8">—</div>';
  }
  async function load(){
    const r=await fetch('/api/pedidos');
    if(!r.ok){document.body.innerHTML+='<p style="color:red">Sem acesso.</p>';return}
    const peds=await r.json();
    const ativos=peds.filter(p=>p.status!=='cancelado');
    const totalRec=ativos.reduce((s,p)=>s+(Number(p.total)||0),0);
    const totalItens=ativos.reduce((s,p)=>s+(Array.isArray(p.itens)?p.itens.reduce((si,it)=>si+(Number(it.quantidade)||1),0):0),0);
    const taxaTotal=ativos.reduce((s,p)=>s+(Number(p.taxa)||0),0);
    const ticket=ativos.length?totalRec/ativos.length:0;
    const oldest=peds.reduce((m,p)=>p.recebidoEm&&(!m||p.recebidoEm<m)?p.recebidoEm:m,null);
    document.getElementById('relPeriodo').textContent=oldest?`De ${new Date(oldest).toLocaleDateString('pt-BR')} até hoje`:`${peds.length} pedidos`;
    document.getElementById('kpis').innerHTML=[
      ['Receita Total',fmtR(totalRec)],['Pedidos',peds.length],['Itens Vendidos',totalItens+' un.'],
      ['Ticket Médio',fmtR(ticket)],['Taxas / Frete',fmtR(taxaTotal)],
    ].map(([l,v])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-val">${v}</div></div>`).join('');
    // By status
    const byStatus={};peds.forEach(p=>{const s=p.status||'reservado';byStatus[s]=(byStatus[s]||0)+1});
    document.getElementById('byStatus').innerHTML=Object.entries(byStatus).map(([s,n])=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc">${sPill(s)}<span style="margin-left:auto;font-weight:700">${n}</span></div>`).join('');
    // By product
    const prodMap={};
    ativos.forEach(p=>(Array.isArray(p.itens)?p.itens:[]).forEach(it=>{
      const k=it.nome||'?';if(!prodMap[k])prodMap[k]={qty:0,rev:0};
      prodMap[k].qty+=Number(it.quantidade)||1;prodMap[k].rev+=(Number(it.precoUnitario||it.preco)||0)*(Number(it.quantidade)||1);
    }));
    const prodRev={};Object.entries(prodMap).forEach(([k,d])=>prodRev[k]=d.rev);
    document.getElementById('byProd').innerHTML=toRows(prodRev,fmtR);
    // By UF / city
    const byUf={},byCity={};
    peds.forEach(p=>{const uf=(p.cliente?.uf||p.uf||'—').toUpperCase();const city=p.cliente?.cidade||p.cidade||'—';
      byUf[uf]=(byUf[uf]||0)+1;const ck=`${city} / ${uf}`;byCity[ck]=(byCity[ck]||0)+1});
    document.getElementById('byUf').innerHTML=toRows(byUf);
    document.getElementById('byCity').innerHTML=toRows(byCity);
    // Table
    const sorted=[...peds].sort((a,b)=>new Date(b.recebidoEm||0)-new Date(a.recebidoEm||0));
    document.getElementById('tblPedidos').innerHTML=sorted.map(p=>{
      const itens=Array.isArray(p.itens)?p.itens.length:'—';
      return`<tr>
        <td><strong>#${esc(String(p.pedido))}</strong></td>
        <td>${esc(p.cliente?.nome||p.nome||'—')}</td>
        <td>${sPill(p.status)}</td><td>${itens}</td>
        <td>${esc(p.pagamento||'—')}</td>
        <td>${fmtR(p.subtotal||p.total||0)}</td>
        <td>${p.taxa!=null?fmtR(p.taxa):'—'}</td>
        <td style="font-weight:700">${fmtR(p.total||0)}</td>
        <td style="color:#64748b;white-space:nowrap">${fmtD(p.recebidoEm)}</td>
      </tr>`;
    }).join('');
  }
  load();
</script>
</body>
</html>
