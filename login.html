<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acesso | Lemoov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:#383838;display:flex;align-items:center;justify-content:center;overflow:hidden}

    .bg{position:fixed;inset:0;z-index:0}
    .bg::before{content:'';position:absolute;inset:0;background:linear-gradient(145deg,#383838 0%,#2f3326 48%,#EBD8C7 100%)}
    .bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 16% 18%,rgba(168,198,58,.34),transparent 34%),radial-gradient(circle at 80% 76%,rgba(235,216,199,.38),transparent 36%);opacity:.95}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.22}
    .orb-1{width:560px;height:560px;background:radial-gradient(circle,#A8C63A,transparent);top:-150px;left:-150px;animation:f1 12s ease-in-out infinite}
    .orb-2{width:460px;height:460px;background:radial-gradient(circle,#EBD8C7,transparent);bottom:-120px;right:-120px;animation:f2 14s ease-in-out infinite}
    .orb-3{width:320px;height:320px;background:radial-gradient(circle,#6F8522,transparent);top:55%;left:55%;animation:f3 10s ease-in-out infinite}
    @keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
    @keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-25px)}}
    @keyframes f3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-45%,-55%)}}

    .card{position:relative;z-index:1;width:min(420px,92vw);background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(235,216,199,.7);border-radius:24px;padding:44px 40px;box-shadow:0 34px 80px rgba(56,56,56,.35)}

    .brand{text-align:center;margin-bottom:36px}
    .brand-mark{font-family:'Poppins',sans-serif;font-size:30px;font-weight:700;color:#383838;letter-spacing:0;line-height:1}
    .brand-mark em{color:#A8C63A;font-style:normal}
    .brand-sub{font-size:11px;color:#7a6b60;letter-spacing:.14em;text-transform:uppercase;margin-top:6px}

    .card h1{font-size:20px;font-weight:700;color:#383838;margin-bottom:6px}
    .card p{font-size:13px;color:#71675f;margin-bottom:28px}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:11px;font-weight:700;color:#6f6258;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
    .field input{width:100%;padding:13px 16px;background:#fbf8f4;border:1.5px solid #dccabd;border-radius:12px;font-size:14px;color:#383838;outline:none;transition:border-color .2s,background .2s,box-shadow .2s;font-family:inherit;caret-color:#A8C63A}
    .field input::placeholder{color:#a89b91}
    .field input:focus{border-color:#A8C63A;background:#fff;box-shadow:0 0 0 3px rgba(168,198,58,.18)}

    .btn-in{width:100%;padding:14px;background:#A8C63A;border:none;border-radius:12px;font-size:14px;font-weight:700;color:#383838;cursor:pointer;margin-top:4px;transition:background .2s,transform .1s,box-shadow .2s;font-family:inherit;letter-spacing:.02em;position:relative;overflow:hidden}
    .btn-in::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s}
    .btn-in:hover{background:#B4D044;box-shadow:0 10px 30px rgba(168,198,58,.36)}
    .btn-in:active{transform:scale(.98)}
    .btn-in:disabled{opacity:.55;cursor:not-allowed}
    .btn-in.ok{background:#6F8522;color:#fff}

    /* Error */
    .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;border-radius:10px;padding:10px 14px;font-size:13px;margin-top:14px;display:none;text-align:center;animation:shake .4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

    /* Back link */
    .back{display:block;text-align:center;margin-top:22px;font-size:13px;color:#7a6b60;text-decoration:none;transition:color .2s}
    .back:hover{color:#383838}
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="card">
    <div class="brand">
      <div class="brand-mark">Lem<em>oov</em></div>
      <div class="brand-sub">Painel administrativo</div>
    </div>
    <h1>Entrar</h1>
    <p>Acesso restrito à equipe Lemoov.</p>
    <form id="loginForm">
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="loginUser" placeholder="seu usuário" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn-in" type="submit" id="btnLogin">Entrar</button>
      <div class="err" id="loginError">Usuário ou senha incorretos.</div>
    </form>
    <a class="back" href="/">← Voltar ao site</a>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('btnLogin');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando…';
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const redirect = new URLSearchParams(location.search).get('redirect') || '/api/produtos-admin';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, pass, redirect })
        });
        if (!res.ok) {
          errEl.style.display = '';
          errEl.style.animation = 'none';
          requestAnimationFrame(() => { errEl.style.animation = ''; });
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return;
        }
        const data = await res.json();
        btn.classList.add('ok');
        btn.textContent = '✓ Acesso liberado';
        setTimeout(() => { location.href = data.redirect || '/api/produtos-admin'; }, 500);
      } catch {
        errEl.textContent = 'Erro de conexão. Tente novamente.';
        errEl.style.display = '';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
