<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lemoov • Link na bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:  #009C3B;
      --yellow: #FFDF00;
      --navy:   #002776;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Manrope", system-ui, sans-serif;
    }

    /* fundo fixo — sem parallax bugado no mobile */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: url("image/copa_brasil/copa_brasil_07.jpeg") center top / cover no-repeat;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.08)   0%,
        rgba(0,0,0,0.00)  28%,
        rgba(0,39,118,0.62) 62%,
        rgba(0,15,60,0.96) 100%
      );
    }

    /* frame ocupa toda a tela, sem scroll */
    .frame {
      position: relative;
      z-index: 1;
      width: min(480px, 100%);
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(18px, 4vh, 32px) 20px clamp(20px, 4vh, 36px);
    }

    /* ── Logo inline SVG ── */
    .logo-mark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      /* drop-shadow garante símbolo branco visível sobre o fundo claro da foto */
      filter:
        drop-shadow(0 1px 6px rgba(0,0,0,0.45))
        drop-shadow(0 0 2px rgba(0,0,0,0.3));
    }
    .logo-symbol {
      display: block;
      width: clamp(54px, 14vw, 68px);
      height: auto;
    }
    .logo-wordmark {
      font-size: clamp(30px, 7.5vw, 38px);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .logo-le   { color: var(--yellow); }
    .logo-moov { color: var(--green);  }
    .logo-fitness {
      font-family: "Dancing Script", cursive;
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 700;
      color: var(--navy);
      align-self: flex-end;
      margin-top: -4px;
      margin-right: 2px;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px 5px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--navy);
      background: var(--yellow);
      box-shadow: 0 4px 18px rgba(255,223,0,0.55);
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .cta {
      display: grid;
      grid-template-columns: 36px 1fr 22px;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14.5px;
      letter-spacing: 0.01em;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      border: none;
    }
    .cta:active { transform: scale(0.97); }

    .cta--green {
      background: linear-gradient(120deg, #00b845 0%, #007a2f 100%);
      color: #fff;
      box-shadow: 0 5px 18px rgba(0,156,59,0.50);
    }
    .cta--green:hover  { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(0,156,59,0.60); }

    .cta--yellow {
      background: linear-gradient(120deg, #FFE833 0%, #f0cc00 100%);
      color: var(--navy);
      box-shadow: 0 5px 18px rgba(255,223,0,0.45);
    }
    .cta--yellow:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(255,223,0,0.55); }

    .cta--navy {
      background: linear-gradient(120deg, #003ba3 0%, var(--navy) 100%);
      color: #fff;
      box-shadow: 0 5px 18px rgba(0,39,118,0.50);
    }
    .cta--navy:hover   { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(0,39,118,0.60); }

    .cta__icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.18);
      flex-shrink: 0;
    }
    .cta--yellow .cta__icon { background: rgba(0,39,118,0.12); }
    .cta__icon svg { width: 17px; height: 17px; display: block; }
    .cta__label { text-align: center; }
    .cta__arrow { font-size: 17px; text-align: right; opacity: 0.55; line-height: 1; }
    .cta--yellow .cta__arrow { color: var(--navy); }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 2px 0;
    }
    .divider__line { flex: 1; height: 1px; background: rgba(255,255,255,0.18); }
    .divider__text {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* ── Footer ── */
    .footer-note {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="frame">

    <!-- Logo reproduced in SVG com cores da bandeira -->
    <div class="logo-mark">
      <svg class="logo-symbol" viewBox="0 0 100 62" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- cabeça -->
        <circle cx="50" cy="8" r="4.5" fill="white"/>
        <!-- braço esquerdo -->
        <path d="M47 12 C38 19 20 26 5 48"
              stroke="white" stroke-width="3.2" fill="none"
              stroke-linecap="round"/>
        <!-- braço direito -->
        <path d="M53 12 C63 19 76 28 94 40"
              stroke="white" stroke-width="3.2" fill="none"
              stroke-linecap="round"/>
        <!-- loop corpo (lóbulo esquerdo) -->
        <path d="M22 46 C28 30 42 36 42 46 C42 56 56 60 64 46"
              stroke="white" stroke-width="3.2" fill="none"
              stroke-linecap="round"/>
      </svg>

      <div class="logo-wordmark">
        <span class="logo-le">Le</span><span class="logo-moov">moov</span>
      </div>
      <div class="logo-fitness">Fitness</div>
    </div>

    <!-- Badge -->
    <span class="badge">🇧🇷 Coleção Seleção Lemoov 2026</span>

    <!-- Botões -->
    <div class="links">

      <a class="cta cta--green" href="https://lemoov.com.br/catalogo-produtos.html" target="_blank" rel="noopener">
        <span class="cta__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1.5" fill="#fff"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5" fill="#fff" opacity=".7"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5" fill="#fff" opacity=".7"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5" fill="#fff" opacity=".5"/>
          </svg>
        </span>
        <span class="cta__label">Ver catálogo completo</span>
        <span class="cta__arrow">›</span>
      </a>

      <a class="cta cta--yellow" href="https://wa.me/558587408457" target="_blank" rel="noopener">
        <span class="cta__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M20.4 3.6A11.2 11.2 0 0 0 12 0a11.3 11.3 0 0 0-9.8 16.9L0 24l7.4-2a11.3 11.3 0 0 0 4.6 1 11.3 11.3 0 0 0 8-3.3 11.2 11.2 0 0 0 3.3-8 11.2 11.2 0 0 0-3.3-8.1Z" fill="#002776" opacity="0.15"/>
            <path d="M8.4 6.9c.2-.4.5-.4.8-.4h.7c.2 0 .5 0 .7.5.2.5.9 2.2 1 2.4.1.2.1.4 0 .6l-.4.6c-.1.2-.3.4-.1.8.1.4.7 1.3 1.5 2.1.8.8 1.6 1.4 2 1.5.4.1.6.1.8-.1l.7-.4c.2-.1.4-.1.6 0 .2.1 1.9.9 2.2 1 .3.1.5.2.5.4 0 .2 0 1.2-.5 1.8-.5.6-1.4 1.3-3 1.1-1.5-.2-3.4-1.2-5.3-3-1.9-1.9-3.1-4.2-3.3-5.6-.2-1.4.6-2.2.8-2.6Z" fill="#002776"/>
          </svg>
        </span>
        <span class="cta__label">Falar no WhatsApp</span>
        <span class="cta__arrow">›</span>
      </a>

      <div class="divider">
        <div class="divider__line"></div>
        <span class="divider__text">também estamos em</span>
        <div class="divider__line"></div>
      </div>

      <a class="cta cta--navy" href="https://lemoovfitness.stoqui.shop/?utm_source=ig&utm_medium=social&utm_content=link_in_bio" target="_blank" rel="noopener">
        <span class="cta__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 6h18M16 10a4 4 0 01-8 0" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="cta__label">Loja Stoqui</span>
        <span class="cta__arrow">›</span>
      </a>

    </div>

    <p class="footer-note">Atendimento seg–sex · 8h às 18h</p>

  </main>
</body>
</html>
