<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido recebido | Lemoov Fitness</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #6F8522;
      --mint: #A8C63A;
      --yellow: #EBD8C7;
      --blue: #383838;
      --ink: #383838;
      --soft: #F1F6D9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Montserrat, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 18%, rgba(235,216,199, .28), transparent 28rem),
        radial-gradient(circle at 82% 22%, rgba(56,56,56, .18), transparent 26rem),
        linear-gradient(145deg, #fbf8f4 0%, #f3e8dd 48%, #F7F1EB 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(620px, 100%);
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(168,198,58, .16);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(16, 34, 44, .12);
      padding: clamp(28px, 6vw, 54px);
    }
    .mark {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--green), var(--mint));
      color: #fff;
      font-size: 32px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(168,198,58, .25);
    }
    h1 {
      margin: 24px 0 12px;
      font-size: clamp(30px, 7vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: #5d6b76;
      font-size: 16px;
      line-height: 1.65;
    }
    .pedido {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin: 6px 0 24px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid rgba(168,198,58, .14);
      color: var(--green);
      font-weight: 800;
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      color: #383838;
      background: var(--yellow);
    }
    a.secondary {
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--blue));
    }
    a.whatsapp {
      color: #fff;
      background: linear-gradient(135deg, #A8C63A, #6F8522);
      box-shadow: 0 12px 28px rgba(18, 140, 126, .22);
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">✓</div>
    <h1>Pedido recebido</h1>
    <p>Recebemos o retorno do checkout. Assim que a InfinitePay confirmar o pagamento pelo webhook, o pedido fica marcado como pago na área administrativa.</p>
    <div class="pedido">Pedido <span id="pedido">—</span></div>
    <div class="actions">
      <a id="voltarCatalogo" href="catalogo-produtos.html">Voltar ao catálogo</a>
      <a id="whatsEntrega" class="whatsapp" href="https://wa.me/558587408457" target="_blank" rel="noopener">Combinar entrega no WhatsApp</a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pedido = params.get('pedido') || '';
    if (pedido) {
      try { localStorage.removeItem('lemoov_cart_v1'); } catch(_) {}
      try {
        const sid = localStorage.getItem('lemoov_crm_sid');
        if (sid) navigator.sendBeacon('/api/crm/event', JSON.stringify({ sessionId: sid, type: 'purchase', orderId: pedido }));
      } catch(_) {}
    }
    const voltar = params.get('voltar') || 'catalogo-produtos.html';
    document.getElementById('pedido').textContent = pedido || 'em análise';
    document.getElementById('voltarCatalogo').href = voltar.startsWith('/') ? voltar : 'catalogo-produtos.html';
    const texto = pedido
      ? `Olá, acabei de finalizar o pagamento do pedido ${pedido} e gostaria de combinar a entrega.`
      : 'Olá, acabei de finalizar o pagamento e gostaria de combinar a entrega.';
    document.getElementById('whatsEntrega').href = `https://wa.me/558587408457?text=${encodeURIComponent(texto)}`;
  </script>
</body>
</html>
